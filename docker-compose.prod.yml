version: '3.8'
services:
  web:
    build:
      context: .
      target: runtime
    environment:
      - DJANGO_SETTINGS_MODULE=therapeutic_coding.settings.production
    env_file:
      - .env.production
    restart: on-failure
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
      restart_policy:
        condition: on-failure
    networks:
      - appnet

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./infra/nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - appnet

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--protected-mode", "yes"]
    volumes:
      - redisdata:/data
    networks:
      - appnet

volumes:
  pgdata:
  redisdata:
  static_volume:
  media_volume:

networks:
  appnet:
    driver: overlay
